<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeChum ID Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <h1>CodeChum ID Generator</h1>
    </header>

    <div class="main-content">
        <div class="card-container form-card">
            <h2>Create Your ID</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="fullName" placeholder="Cody Chum">
                    <small class="error-text" id="nameError"></small>
                </div>
                <div class="form-group">
                    <label>Nickname:</label>
                    <input type="text" id="nickname" placeholder="Cody">
                    <small class="error-text" id="nickError"></small>
                </div>
                <div class="form-group">
                    <label>Date of Birth:</label>
                    <input type="date" id="dob">
                    <small class="error-text" id="dobError"></small>
                </div>
                <div class="form-group">
                    <label>Address:</label>
                    <input type="text" id="address" placeholder="Cody Chum Land">
                    <small class="error-text" id="addressError"></small>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="codychum@codechum.com">
                    <small class="error-text" id="emailError"></small>
                </div>
                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
        </div>

        <div class="preview-section">
            <div class="id-badge" id="idBadge">
                <div class="badge-header">
                    <div class="logo-box"></div>
                    <span>CodeChum University</span>
                </div>
                <div class="badge-body">
                    <div class="avatar-placeholder">
                        <div class="head"></div>
                        <div class="torso"></div>
                    </div>
                    <div class="badge-info">
                        <p>ID: <span class="id-number">####</span></p>
                        <p>Name: <span id="resName">N/A</span></p>
                        <p>Nickname: <span id="resNick">N/A</span></p>
                        <p>Date of Birth: <span id="resDob">N/A</span></p>
                        <p>Address: <span id="resAddr">N/A</span></p>
                        <p>Email: <span id="resEmail">N/A</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
