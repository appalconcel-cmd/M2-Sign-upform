<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeChum ID Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="banner">
        <h1>CodeChum ID Generator</h1>
    </header>

    <main class="main-layout">
        <section class="card form-container">
            <h2>Create Your ID</h2>
            <form id="idRegistrationForm">
                <div class="field-wrapper">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" placeholder="Cody Chum">
                    <span class="error-msg" id="nameError"></span>
                </div>
                <div class="field-wrapper">
                    <label for="nickname">Nickname:</label>
                    <input type="text" id="nickname" placeholder="Cody">
                    <span class="error-msg" id="nickError"></span>
                </div>
                <div class="field-wrapper">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob">
                    <span class="error-msg" id="dobError"></span>
                </div>
                <div class="field-wrapper">
                    <label for="address">Address:</label>
                    <input type="text" id="address" placeholder="Cody Chum Land">
                    <span class="error-msg" id="addressError"></span>
                </div>
                <div class="field-wrapper">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="codychum@codechum.com">
                    <span class="error-msg" id="emailError"></span>
                </div>
                <button type="submit" class="submit-button">Sign Up</button>
            </form>
        </section>

        <section class="preview-container">
            <div class="id-badge" id="idBadge">
                <div class="id-header">
                    <div class="id-logo"></div>
                    <span>CodeChum University</span>
                </div>
                <div class="id-content">
                    <div class="id-avatar"></div>
                    <div class="id-data">
                        <p>ID: <span class="highlight">####</span></p>
                        <p>Name: <span id="resName" class="highlight">N/A</span></p>
                        <p>Nickname: <span id="resNick" class="highlight">N/A</span></p>
                        <p>Date of Birth: <span id="resDob" class="highlight">N/A</span></p>
                        <p>Address: <span id="resAddr" class="highlight">N/A</span></p>
                        <p>Email: <span id="resEmail" class="highlight">N/A</span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="javascript.js"></script>
</body>
</html>
